name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  build-info:
    runs-on: ubuntu-latest
    outputs:
      is_tagged: ${{ steps.info.outputs.is_tagged }}
      version: ${{ steps.info.outputs.version }}
      release_tag: ${{ steps.info.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get build info
        id: info
        shell: bash
        run: |
          DATE=$(date +'%Y%m%d')
          HASH=$(git rev-parse --short HEAD)
          if TAG=$(git describe --exact-match --tags HEAD 2>/dev/null); then
            echo "is_tagged=true" >> "$GITHUB_OUTPUT"
            echo "version=$TAG" >> "$GITHUB_OUTPUT"
            echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "is_tagged=false" >> "$GITHUB_OUTPUT"
            echo "version=${DATE}-${HASH}" >> "$GITHUB_OUTPUT"
            echo "release_tag=nessie-${DATE}-${HASH}" >> "$GITHUB_OUTPUT"
          fi

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    needs: [build-info]
    name: build (${{ matrix.target }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            toolchain: stable
            target: x86_64-unknown-linux-gnu
            bin_ext: ""
            artifact_name: nessie-linux-x64
          - os: windows-latest
            toolchain: stable
            target: x86_64-pc-windows-gnu
            bin_ext: ".exe"
            artifact_name: nessie-windows-x64
          - os: macos-latest
            toolchain: stable
            target: x86_64-apple-darwin
            bin_ext: ""
            artifact_name: nessie-macos-x64
          - os: macos-latest
            toolchain: stable
            target: aarch64-apple-darwin
            bin_ext: ""
            artifact_name: nessie-macos-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --locked --verbose --target ${{ matrix.target }}
        env:
          VERSION: ${{ needs.build-info.outputs.version }}
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/${{ matrix.target }}/release/nessie${{ matrix.bin_ext }}
          if-no-files-found: error

  wasm:
    needs: [build-info]
    name: build and deploy (wasm32-unknown-unknown, ubuntu-latest)
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      public_url: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.1
      - name: Build Release
        env:
          VERSION: ${{ needs.build-info.outputs.version }}
        run: |
          TRUNK_BUILD_ID=$(date +%s) trunk build --release --cargo-profile release-wasm --minify --public-url $public_url
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  release:
    needs: [build-info, build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Prepare release files
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            if [ -f "$dir/nessie.exe" ]; then
              (cd "$dir" && zip "../${name}.zip" nessie.exe)
            elif [ -f "$dir/nessie" ]; then
              (cd "$dir" && zip "../${name}.zip" nessie)
            fi
          done
      - name: Delete existing prereleases
        if: needs.build-info.outputs.is_tagged == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          api_url="https://api.github.com/repos/${{ github.repository }}/releases"
          releases=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$api_url")
          echo "$releases" | jq -c '.[] | select(.prerelease == true)' | while read -r release; do
            release_id=$(echo "$release" | jq -r '.id')
            release_tag=$(echo "$release" | jq -r '.tag_name')
            echo "Deleting prerelease: $release_id (tag: $release_tag)"
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" "$api_url/$release_id"
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$release_tag"
          done
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ needs.build-info.outputs.release_tag }}
          tag: ${{ needs.build-info.outputs.release_tag }}
          draft: false
          prerelease: ${{ needs.build-info.outputs.is_tagged == 'false' }}
          artifacts: "artifacts/*.zip"
          body: |
            Automated prerelease: ${{ needs.build-info.outputs.release_tag }}
